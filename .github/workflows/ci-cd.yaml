name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORDER_IMAGE_NAME: ${{ github.repository }}/order-service
  INVENTORY_IMAGE_NAME: ${{ github.repository }}/inventory-service

jobs:
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 pytest

      - name: Run flake8 (order-service)
        run: flake8 order-service/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run flake8 (inventory-service)
        run: flake8 inventory-service/ --count --select=E9,F63,F7,F82 --show-source --statistics

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r order-service/requirements.txt
          pip install -r inventory-service/requirements.txt
          pip install pytest httpx

      - name: Run unit tests (order-service)
        run: pytest order-service/tests/ -v

      - name: Run unit tests (inventory-service)
        run: pytest inventory-service/tests/ -v

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ORDER_IMAGE_NAME }}
            ${{ env.INVENTORY_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }},priority=100
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push order-service image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: |
            ${{ env.ORDER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ORDER_IMAGE_NAME }}:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push inventory-service image
        uses: docker/build-push-action@v5
        with:
          context: ./inventory-service
          push: true
          tags: |
            ${{ env.INVENTORY_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.INVENTORY_IMAGE_NAME }}:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output image tags
        run: |
          echo "ORDER_IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "INVENTORY_IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-domain.com
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy order-service
        run: |
          kubectl set image deployment/order-service order-service=${{ env.REGISTRY }}/${{ env.ORDER_IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy inventory-service
        run: |
          kubectl set image deployment/inventory-service inventory-service=${{ env.REGISTRY }}/${{ env.INVENTORY_IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/order-service --timeout=120s
          kubectl rollout status deployment/inventory-service --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=order-service
          kubectl get pods -l app=inventory-service
