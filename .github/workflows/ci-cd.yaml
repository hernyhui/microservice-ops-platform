name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORDER_IMAGE_NAME: ${{ github.repository_owner }}/order-service
  INVENTORY_IMAGE_NAME: ${{ github.repository_owner }}/inventory-service

jobs:
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8 pytest
      - run: flake8 order-service/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - run: flake8 inventory-service/ --count --select=E9,F63,F7,F82 --show-source --statistics

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r order-service/requirements.txt
          pip install -r inventory-service/requirements.txt
          pip install pytest httpx
      - run: pytest order-service/tests/ -v
      - run: pytest inventory-service/tests/ -v

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: |
            ${{ env.ORDER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ORDER_IMAGE_NAME }}:${{ github.ref_name }}
      - uses: docker/build-push-action@v5
        with:
          context: ./inventory-service
          push: true
          tags: |
            ${{ env.INVENTORY_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.INVENTORY_IMAGE_NAME }}:${{ github.ref_name }}

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-domain.com
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      - uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      - run: kubectl set image deployment/order-service order-service=${{ env.REGISTRY }}/${{ env.ORDER_IMAGE_NAME }}:${{ github.sha }}
      - run: kubectl set image deployment/inventory-service inventory-service=${{ env.REGISTRY }}/${{ env.INVENTORY_IMAGE_NAME }}:${{ github.sha }}
      - run: kubectl rollout status deployment/order-service --timeout=120s
      - run: kubectl rollout status deployment/inventory-service --timeout=120s
      - run: kubectl get pods -l app=order-service
      - run: kubectl get pods -l app=inventory-service
